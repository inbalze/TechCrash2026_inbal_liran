; =============================================================
; CrashTech VLSI-2026 — Challenge 3 Upgraded: Parallel Bus
; ESP32 firmware — ISR-driven 8-bit parallel bus + UART checksum
; =============================================================
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino
upload_speed = 115200

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_RUNNING_CORE=1

; No library dependencies — GPIO ISR uses ESP-IDF driver directly
