<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" width="420" height="300" font-family="monospace">

  <!-- Title -->
  <text x="210" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">VGA DE-15 Female — Face View (on DE10-Lite)</text>
  <text x="210" y="42" text-anchor="middle" font-size="11" fill="#555">(looking at the port on the back of the board)</text>

  <!-- Connector outer shell — trapezoidal D-sub shape -->
  <path d="M 50,65 Q 50,55 62,55 L 358,55 Q 370,55 370,65 L 375,230 Q 375,245 362,245 L 58,245 Q 45,245 45,230 Z"
        fill="#b0b0b0" stroke="#555" stroke-width="2.5"/>

  <!-- Inner face -->
  <path d="M 65,72 Q 65,65 74,65 L 346,65 Q 355,65 355,72 L 360,225 Q 360,235 350,235 L 70,235 Q 60,235 60,225 Z"
        fill="#1a1a2e" stroke="#444" stroke-width="1.5"/>

  <!-- Helper: pin circle macro — row 1: pins 1-5, y=105 -->
  <!-- Row 1: 1 2 3 4 5 -->
  <!-- Pin 1: Red -->
  <circle cx="105" cy="105" r="14" fill="#cc3333" stroke="#fff" stroke-width="1.5"/>
  <text x="105" y="110" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">1</text>
  <!-- Pin 2: Green -->
  <circle cx="157" cy="105" r="14" fill="#33aa33" stroke="#fff" stroke-width="1.5"/>
  <text x="157" y="110" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">2</text>
  <!-- Pin 3: Blue -->
  <circle cx="209" cy="105" r="14" fill="#3366cc" stroke="#fff" stroke-width="1.5"/>
  <text x="209" y="110" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">3</text>
  <!-- Pin 4: NC -->
  <circle cx="261" cy="105" r="14" fill="#555" stroke="#fff" stroke-width="1.5"/>
  <text x="261" y="110" text-anchor="middle" font-size="11" fill="#aaa" font-weight="bold">4</text>
  <!-- Pin 5: GND (sync gnd) -->
  <circle cx="313" cy="105" r="14" fill="#f0c040" stroke="#fff" stroke-width="2"/>
  <text x="313" y="110" text-anchor="middle" font-size="11" fill="#222" font-weight="bold">5</text>

  <!-- Row 2: 6 7 8 9 10 — y=160 -->
  <!-- Pin 6: Red GND -->
  <circle cx="105" cy="160" r="14" fill="#f0c040" stroke="#fff" stroke-width="2"/>
  <text x="105" y="165" text-anchor="middle" font-size="11" fill="#222" font-weight="bold">6</text>
  <!-- Pin 7: Green GND -->
  <circle cx="157" cy="160" r="14" fill="#f0c040" stroke="#fff" stroke-width="2"/>
  <text x="157" y="165" text-anchor="middle" font-size="11" fill="#222" font-weight="bold">7</text>
  <!-- Pin 8: Blue GND -->
  <circle cx="209" cy="160" r="14" fill="#f0c040" stroke="#fff" stroke-width="2"/>
  <text x="209" y="165" text-anchor="middle" font-size="11" fill="#222" font-weight="bold">8</text>
  <!-- Pin 9: +5V (DDC) -->
  <circle cx="261" cy="160" r="14" fill="#cc3333" stroke="#fff" stroke-width="1.5"/>
  <text x="261" y="165" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">9</text>
  <!-- Pin 10: GND (sync) -->
  <circle cx="313" cy="160" r="14" fill="#f0c040" stroke="#fff" stroke-width="2"/>
  <text x="313" y="165" text-anchor="middle" font-size="11" fill="#222" font-weight="bold">10</text>

  <!-- Row 3: 11 12 13 14 15 — y=210, offset by half pitch -->
  <!-- Pin 11: NC -->
  <circle cx="118" cy="210" r="14" fill="#555" stroke="#fff" stroke-width="1.5"/>
  <text x="118" y="215" text-anchor="middle" font-size="11" fill="#aaa" font-weight="bold">11</text>
  <!-- Pin 12: DDC data -->
  <circle cx="170" cy="210" r="14" fill="#555" stroke="#fff" stroke-width="1.5"/>
  <text x="170" y="215" text-anchor="middle" font-size="11" fill="#aaa" font-weight="bold">12</text>
  <!-- Pin 13: HSync -->
  <circle cx="222" cy="210" r="14" fill="#555" stroke="#fff" stroke-width="1.5"/>
  <text x="222" y="215" text-anchor="middle" font-size="11" fill="#aaa" font-weight="bold">13</text>
  <!-- Pin 14: VSync -->
  <circle cx="274" cy="210" r="14" fill="#555" stroke="#fff" stroke-width="1.5"/>
  <text x="274" y="215" text-anchor="middle" font-size="11" fill="#aaa" font-weight="bold">14</text>
  <!-- Pin 15: DDC clk -->
  <circle cx="326" cy="210" r="14" fill="#555" stroke="#fff" stroke-width="1.5"/>
  <text x="326" y="215" text-anchor="middle" font-size="11" fill="#aaa" font-weight="bold">15</text>

  <!-- Legend -->
  <rect x="45" y="258" width="14" height="14" fill="#f0c040" stroke="#555" stroke-width="1"/>
  <text x="65" y="270" font-size="12" fill="#222">GND  — pins 5, 6, 7, 8, 10  (use any one)</text>

  <rect x="45" y="278" width="14" height="14" fill="#555" stroke="#555" stroke-width="1"/>
  <text x="65" y="290" font-size="12" fill="#555">NC / signal — not needed</text>

</svg>
