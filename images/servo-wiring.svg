<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <style>
      .label { font-size: 13px; font-weight: 600; }
      .note { font-size: 10px; fill: #888; }
      .pin { font-family: 'Fira Code','Cascadia Code', monospace; font-size: 11px; font-weight: 700; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#0d0d1a" rx="12"/>
  <text fill="#e0e0e0" font-size="18" font-weight="700" text-anchor="middle" x="350" y="32">Servo Wiring — CrashTech Kit</text>
  <text fill="#666" font-size="11" text-anchor="middle" x="350" y="50">SG90 / MG90S Micro Servo → ESP32 DevKit</text>

  <!-- ==================== SERVO ==================== -->
  <!-- Servo body -->
  <rect x="40" y="100" width="160" height="110" fill="#2a2a3a" stroke="#555" stroke-width="2" rx="8"/>
  <!-- Servo horn -->
  <rect x="130" y="76" width="40" height="30" fill="#333" stroke="#555" stroke-width="1.5" rx="4"/>
  <circle cx="150" cy="92" r="8" fill="#444" stroke="#666" stroke-width="1.5"/>
  <circle cx="150" cy="92" r="3" fill="#222"/>
  <!-- Servo label -->
  <text fill="#ccc" font-size="15" font-weight="700" text-anchor="middle" x="120" y="150">SERVO</text>
  <text fill="#777" font-size="10" text-anchor="middle" x="120" y="166">SG90</text>

  <!-- ==================== 3-PIN CONNECTOR (at servo) ==================== -->
  <!-- Connector housing -->
  <rect x="70" y="210" width="100" height="44" fill="#1a1a28" stroke="#666" stroke-width="2" rx="6"/>
  <text fill="#888" font-size="8" text-anchor="middle" x="120" y="264">3-pin connector</text>

  <!-- Pin 1: Brown (GND) -->
  <rect x="78" y="218" width="24" height="28" fill="#4a3520" stroke="#8B4513" stroke-width="2" rx="3"/>
  <text class="pin" x="90" y="237" text-anchor="middle" fill="#CD853F">B</text>

  <!-- Pin 2: Red (VCC) - MIDDLE -->
  <rect x="108" y="218" width="24" height="28" fill="#3a1515" stroke="#cc2222" stroke-width="2" rx="3"/>
  <text class="pin" x="120" y="237" text-anchor="middle" fill="#ff4444">R</text>

  <!-- Pin 3: Yellow (Signal) -->
  <rect x="138" y="218" width="24" height="28" fill="#3a3510" stroke="#ccaa00" stroke-width="2" rx="3"/>
  <text class="pin" x="150" y="237" text-anchor="middle" fill="#ffd700">Y</text>

  <!-- ==================== ESP32 BOARD (partial) ==================== -->
  <rect x="430" y="70" width="220" height="290" fill="#1a1a2e" stroke="#3a3a5c" stroke-width="2" rx="10"/>
  <text fill="#e0e0e0" font-size="14" font-weight="700" text-anchor="middle" x="540" y="92">ESP32 DevKit</text>

  <!-- Left column pins (showing relevant ones) -->
  <!-- 5V pin -->
  <rect x="440" y="300" width="70" height="24" fill="#3a1515" stroke="#cc2222" stroke-width="2" rx="4"/>
  <text class="pin" x="475" y="316" text-anchor="middle" fill="#ff4444">5V</text>
  <text fill="#ff4444" font-size="9" x="445" y="336">USB power</text>

  <!-- GND pin (left side) -->
  <rect x="440" y="250" width="70" height="24" fill="#1a1a28" stroke="#666" stroke-width="2" rx="4"/>
  <text class="pin" x="475" y="266" text-anchor="middle" fill="#888">GND</text>

  <!-- Right column pins (showing relevant ones) -->
  <!-- GPIO 18 (Servo) -->
  <rect x="560" y="180" width="70" height="24" fill="#2a2030" stroke="#ab47bc" stroke-width="2" rx="4"/>
  <text class="pin" x="595" y="196" text-anchor="middle" fill="#ce93d8">18</text>

  <!-- GPIO 19 above for context -->
  <rect x="560" y="150" width="70" height="24" fill="#1a1a28" stroke="#444" stroke-width="1" rx="4"/>
  <text class="pin" x="595" y="166" text-anchor="middle" fill="#555">19</text>

  <!-- GPIO 5 below for context -->
  <rect x="560" y="210" width="70" height="24" fill="#1a1a28" stroke="#444" stroke-width="1" rx="4"/>
  <text class="pin" x="595" y="226" text-anchor="middle" fill="#555">5</text>

  <!-- Side labels -->
  <text fill="#555" font-size="9" x="460" y="118">Left</text>
  <text fill="#555" font-size="9" x="600" y="118">Right</text>
  <text fill="#555" font-size="8" x="460" y="130">side</text>
  <text fill="#555" font-size="8" x="600" y="130">side</text>

  <!-- ==================== WIRES ==================== -->

  <!-- BROWN wire: GND (servo pin 1) → ESP32 GND -->
  <path d="M 90,246 L 90,290 Q 90,310 110,310 L 300,310 Q 320,310 340,290 L 400,262 L 440,262"
        fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <!-- Brown wire label -->
  <rect x="245" y="296" width="72" height="20" fill="#0d0d1a" rx="3"/>
  <text class="label" x="281" y="311" text-anchor="middle" fill="#CD853F">BROWN</text>
  <text class="note" x="281" y="323" text-anchor="middle">GND</text>

  <!-- RED wire: VCC (servo pin 2) → ESP32 5V -->
  <path d="M 120,246 L 120,340 Q 120,360 140,360 L 360,360 Q 380,360 400,340 L 430,316 L 440,312"
        fill="none" stroke="#cc2222" stroke-width="4" stroke-linecap="round"/>
  <!-- Red wire label -->
  <rect x="240" y="348" width="56" height="20" fill="#0d0d1a" rx="3"/>
  <text class="label" x="268" y="363" text-anchor="middle" fill="#ff4444">RED</text>
  <text class="note" x="268" y="378" text-anchor="middle">5V power</text>

  <!-- YELLOW wire: Signal (servo pin 3) → ESP32 GPIO 18 -->
  <path d="M 150,246 L 150,280 Q 150,294 170,294 L 320,210 Q 340,198 360,192 L 560,192"
        fill="none" stroke="#ccaa00" stroke-width="4" stroke-linecap="round"/>
  <!-- Yellow wire label -->
  <rect x="270" y="185" width="76" height="20" fill="#0d0d1a" rx="3"/>
  <text class="label" x="308" y="200" text-anchor="middle" fill="#ffd700">YELLOW</text>
  <text class="note" x="308" y="214" text-anchor="middle">Signal (PWM)</text>

  <!-- Arrow heads at ESP32 pins -->
  <polygon fill="#8B4513" points="440,262 432,256 432,268"/>
  <polygon fill="#cc2222" points="440,312 432,306 432,318"/>
  <polygon fill="#ccaa00" points="560,192 568,186 568,198"/>

  <!-- ==================== MAPPING TABLE ==================== -->
  <rect x="40" y="280" width="160" height="80" fill="none"/>

  <!-- ==================== BOTTOM NOTE ==================== -->
  <rect x="380" y="360" width="300" height="30" fill="#1a1510" stroke="#ff6b35" stroke-width="1" rx="5"/>
  <text fill="#ffaa55" font-size="10" font-weight="600" text-anchor="middle" x="530" y="373">⚠ Red = 5V (not 3V3!)</text>
  <text fill="#cc8855" font-size="9" text-anchor="middle" x="530" y="385">Servo needs 5V. 3.3V won't move it.</text>

</svg>
